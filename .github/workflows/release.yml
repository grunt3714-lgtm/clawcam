name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: clawcam-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clawcam-darwin-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gstreamer pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/clawcam ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 2>/dev/null || \
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  # ARM cross-compile is currently broken because cross-rs's default gcc-9
  # toolchain predates glibc 2.32 / libstdc++ C++17 symbols that the pyke/ort
  # prebuilt aarch64 binary was compiled against (undefined reference to
  # std::__throw_bad_array_new_length, __libc_single_threaded). The fix needs
  # either a newer cross image or a move to zig cc; until then Pi devices
  # build from source on-device via rustup + `cargo build --release`. See
  # SKILL.md for the deploy procedure.

  model:
    name: Package YOLO model
    runs-on: ubuntu-latest
    steps:
      - name: Export YOLOv8n to ONNX
        run: |
          pip install ultralytics onnx --quiet
          python3 -c "
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          model.export(format='onnx', imgsz=640, opset=17, simplify=True)
          "
          test -f yolov8n.onnx || exit 1
          sha256sum yolov8n.onnx > yolov8n.onnx.sha256

      - name: Upload model artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yolov8n-model
          path: |
            yolov8n.onnx
            yolov8n.onnx.sha256

  release:
    name: Create release
    needs: [build-native, model]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.onnx" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            **🤖 Send to your AI agent:**
            > Read https://raw.githubusercontent.com/McBride-Farms/clawcam/master/SKILL.md and install the clawcam skill. Run: `curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/skill-install.sh | bash`

            **👤 Manual install:**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/McBride-Farms/clawcam/master/install.sh | bash
            ```

            Or download the binary for your platform from the assets below.

            ## Assets

            | File | Description |
            |------|-------------|
            | `clawcam-linux-amd64` | Host CLI — Linux x86_64 |
            | `clawcam-darwin-amd64` | Host CLI — macOS Intel |
            | `clawcam-darwin-arm64` | Host CLI — macOS Apple Silicon |
            | `clawcam-pi-arm64` | Device binary — Raspberry Pi 4/5 (64-bit) |
            | `clawcam-pi-armv7` | Device binary — Raspberry Pi 3/Zero 2 (32-bit) |
            | `yolov8n.onnx` | YOLOv8n detection model (COCO 80-class) |
