name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Host platforms (where the CLI runs)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: clawcam-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clawcam-darwin-arm64

          # Device platforms (what gets deployed to Pi)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawcam-pi-arm64
            cross: true
            device: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact: clawcam-pi-armv7
            cross: true
            device: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config

      - name: Install cross-compilation dependencies
        if: matrix.cross
        run: |
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            libc6-dev-arm64-cross libc6-dev-armhf-cross

          # Set up pkg-config for cross-compilation
          sudo dpkg --add-architecture arm64 2>/dev/null || true
          sudo dpkg --add-architecture armhf 2>/dev/null || true

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gstreamer pkg-config

      - name: Configure cross-compilation
        if: matrix.cross
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"

          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/clawcam ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  model:
    name: Package YOLO model
    runs-on: ubuntu-latest
    steps:
      - name: Download YOLOv8n ONNX
        run: |
          wget -q -O yolov8n.onnx \
            https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.onnx
          sha256sum yolov8n.onnx > yolov8n.onnx.sha256

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolov8n-model
          path: |
            yolov8n.onnx
            yolov8n.onnx.sha256

  release:
    name: Create release
    needs: [build, model]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.onnx" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/grunt3714-lgtm/clawcam/master/install.sh | bash
            ```

            Or download the binary for your platform from the assets below.

            ## Assets

            | File | Description |
            |------|-------------|
            | `clawcam-linux-amd64` | Host CLI — Linux x86_64 |
            | `clawcam-linux-arm64` | Host CLI — Linux ARM64 |
            | `clawcam-darwin-amd64` | Host CLI — macOS Intel |
            | `clawcam-darwin-arm64` | Host CLI — macOS Apple Silicon |
            | `clawcam-pi-arm64` | Device binary — Raspberry Pi 4/5 (64-bit) |
            | `clawcam-pi-armv7` | Device binary — Raspberry Pi 3/Zero 2 (32-bit) |
            | `yolov8n.onnx` | YOLOv8n detection model |
